<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="uft-8"/>
        <title>FreeCodeCamp Survey Form</title>
        <link rel="stylesheet" href="survey_form.css">
    </head>
    <body>
        <h1 id="title" class="title">freeCodeCamp Survey Form</h1>
        <p id="description" class="title">Thank you for taking the time to help us improve the platform</p>
        <form id="survey-form" class="survey-form">
        <fieldset>
            <label for="name-label" id="name-label">Name</label>
            <input type="text" id="name" class="text-select-button" required placeholder="Enter your name">
            <label for="email-label" id="email-label">Email</label>
            <input type="email" id="email" class="text-select-button" required placeholder="Enter your email">
            <label for="number-label" id="number-label">Age</label> <span>(Optional)</span>
            <input type="number" id="number" min="6" max="100" placeholder="Age" class="text-select-button">
            <p>Which option best describes your current role?</p>
            <select>
                <option disabled selected value>Select current role</option>
                <option value="student" class="role">Student</option>
                <option value="job" class="text-select-button">Full time job</option>
                <option value="learner" class="role">Full time learner</option>
                <option value="preferNo" class="role">Prefer not to say</option>
                <option value="other" class="role">Other</option>
            </select>
        </fieldset>
        <fieldset>
            <p>Would you recommend freeCodeCamp to a friend?</p>
            <label><input type="radio" name="recomendation" value="definitely"> Definitely</label>
            <label><input type="radio" name="recomendation" value="maybe"> Maybe</label>
            <label><input type="radio" name="recomendation" value="not-sure"> Not sure</label>
        </fieldset>
        <fieldset>
            <label>What is your favorite feature of freeCodeCamp?</label>
            <select id="dropdown">
                <option selected value disabled>Select an option</option>
                <option value="challeges">Challenges</option>
                <option value="projects">Projects</option>
                <option value="community">Community</option>
                <option value="openSource">Open Source</option>
            </select>
        </fieldset>
        <fieldset>
            <p>What would you like to see improved? (Check all that apply)</p>
            <label><input name="prefer" value="front-end-projects" class="input-checkbox" type="checkbox">Front-end Projects</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="back-end-projects" >Back-end Projects</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="data-visualization" >Data Visualization</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="challenges" >Challenges</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="open-source-community" >Open Source Community</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="gitter-help-rooms">Gitter Help Rooms</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="video">Videos</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="city-meetups">City Meetups</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="wiki">Wiki</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="forum">Forum</label>
            <label><input name="prefer" type="checkbox" class="input-checkbox" value="additional-courses">Additional Courses</label>
        </fieldset>
        <fieldset>
            <p>Any comments or suggestions?</p>
            <textarea id="comments" name="comments" placeholder="Enter your comment here..." class="text-select-button"></textarea>
        </fieldset>
        <fieldset>
            <label><input type="submit" value="Submit" class="text-select-button" id="submit">
            </label>
        </fieldset>
        </form>
    </body>
</html>
